services:
  postgres:
    image: postgres:16-alpine
    container_name: finops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: finops
      POSTGRES_PASSWORD: finops
      POSTGRES_DB: finops_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finops"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional GUI. Remove if you prefer `npm run db:studio`.
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: finops-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@finops.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
